@if (isOpen) {
<div data-backdrop="true"
    class="fixed inset-0 z-10 flex items-center justify-center p-8 bg-black/50 backdrop-blur-xs modal-backdrop ml-16 mt-14"
    (click)="onBackdropClick($event)">

    <div
        class="bg-sec rounded-lg shadow-2xl w-full max-w-md sm:max-w-lg md:max-w-xl max-h-[85vh] flex flex-col modal-panel text-primary">

        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b myBorder">
            <h2 class="text-2xl font-bold text-primary">{{ title }}</h2>
            <button type="button" (click)="close()"
                class="w-8 h-8 rounded-full flex items-center justify-center text-sec hover:bg-base hover:text-primary transition"
                aria-label="Close">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Body -->
        <div class="flex-1 overflow-y-auto px-6 py-6">
            <form [formGroup]="form" (ngSubmit)="submitForm()" class="space-y-6" id="configModalForm">

                <!-- Name -->
                <div>
                    <label class="block text-sec font-medium mb-2">{{ tabName }} Name</label>
                    <input type="text" formControlName="libelle"
                        class="w-full px-4 py-2 bg-base border myBorder rounded-lg focus:ring-2 focus:ring-(--color-btn-primary) outline-none"
                        [placeholder]="tabName + ' name'"
                        [class.border-red-500]="submitted && f['libelle'].errors" />
                    @if (submitted && f['libelle'].errors) {
                    <div class="text-red-500 text-xs mt-1">
                        @if (f['libelle'].errors['required']) { <span>Name is required</span> }
                        @else if (f['libelle'].errors['minlength']) { <span>Minimum 3 characters</span> }
                    </div>
                    }
                </div>

                <!-- Location (structures only) -->
                @if (showLieu) {
                <div>
                    <label class="block text-sec font-medium mb-2">Location</label>
                    <input type="text" formControlName="lieu"
                        class="w-full px-4 py-2 bg-base border myBorder rounded-lg focus:ring-2 focus:ring-(--color-btn-primary) outline-none"
                        placeholder="e.g., Tunis" />
                </div>
                }

                <!-- Description -->
                <div>
                    <label class="block text-sec font-medium mb-2">Description</label>
                    <textarea formControlName="description"
                        class="w-full px-4 py-2 bg-base border myBorder rounded-lg focus:ring-2 focus:ring-(--color-btn-primary) outline-none"
                        rows="3" placeholder="Optional description"></textarea>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="flex gap-4 px-6 py-4 border-t myBorder">
            <button type="submit" form="configModalForm" [disabled]="loading"
                class="flex-1 btn-primary py-2 rounded-lg transition disabled:opacity-50">
                {{ loading ? 'Saving…' : (isEditing ? 'Update ' + tabName : 'Create ' + tabName) }}
            </button>

            <button type="button" (click)="close()"
                class="flex-1 bg-sec border myBorder text-primary py-2 rounded-lg transition hover:bg-base">
                Cancel
            </button>
        </div>
    </div>
</div>
}
