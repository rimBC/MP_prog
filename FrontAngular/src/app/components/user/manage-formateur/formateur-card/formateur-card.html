<article
    class="group relative bg-sec border myBorder rounded-2xl p-4 sm:p-5 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 overflow-hidden">

    <!-- Header: avatar + name + type badge -->
    <header class="flex items-start gap-3 sm:gap-4 mb-4">
        <div
            class="shrink-0 w-18 h-18 sm:w-20 sm:h-20 rounded-xl bg-base-contrast flex items-center justify-center text-white font-bold text-base sm:text-lg shadow-md">
            {{ initials }}
        </div>

        <div class="flex-1 min-w-0 flex flex-col gap-1">
            <h3 class="text-sm sm:text-base font-semibold text-primary truncate">{{ fullName }}</h3>
            <p class="text-xs text-sec truncate mt-0.5">{{ formateur.specialite }}</p>
            <span [ngClass]="formateur.type == 'interne' ? 'bg-primary' : 'bg-red-200'"  class="px-3 py-1 rounded-full text-xs font-semibold text-primary max-w-20 mt-1 ">
                    {{ formateur.type.toUpperCase()}}
                </span>
        </div>
        
        <div class="flex gap-2">
            <button (click)="editFormateur(formateur)" class="flex-1 btn shadow-sm rounded-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                    class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                </svg>
        
            </button>
            <button (click)="deleteFormateur(formateur)" class="flex-1 btn shadow-sm rounded-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                    class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                </svg>
        
            </button>
        </div>
    </header>

    <!-- Bio -->
    @if (formateur.bio) {
    <p class="text-xs sm:text-sm text-sec line-clamp-2 mb-4 leading-relaxed">
        {{ formateur.bio }}
    </p>
    }

    <!-- Contact info -->
    <dl class="space-y-2 text-xs sm:text-sm border-t myBorder pt-3">
        <div class="flex items-center gap-2 text-sec min-w-0">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <span class="truncate text-primary">{{ formateur.email }}</span>
        </div>

        <div class="flex items-center gap-2 text-sec">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
            </svg>
            <span class="text-primary">{{ formateur.tel }}</span>
        </div>

        @if (formateur.employeurNom) {
        <div class="flex items-center gap-2 text-sec">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
            <span class="truncate text-primary">{{ formateur.employeurNom }}</span>
        </div>
        }
    </dl>

</article>
