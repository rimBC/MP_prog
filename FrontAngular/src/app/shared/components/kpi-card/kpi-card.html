<div class="bg-sec rounded-xl p-3 sm:p-4 shadow-sm border myBorder hover:shadow-md transition flex items-center gap-3 sm:gap-4 h-full">
    <div class="size-10 sm:size-12 shrink-0 rounded-full flex items-center justify-center"
         [ngClass]="'bg-stats-' + tone + ' text-stats-' + tone">
        <i class="bi {{ icon }} text-base sm:text-xl"></i>
    </div>
    <div class="flex-1 min-w-0">
        <p class="text-sec text-[10px] sm:text-xs font-medium uppercase tracking-wider truncate">{{ label }}</p>
        <p class="text-lg sm:text-2xl font-bold text-primary mt-0.5 truncate">{{ value }}</p>
        @if (hint) {
            <p class="text-[10px] sm:text-xs text-sec mt-0.5 truncate">{{ hint }}</p>
        }
    </div>
</div>
