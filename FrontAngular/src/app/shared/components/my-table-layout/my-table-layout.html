<div class="rounded-md w-full shadow-sm overflow-hidden border-gray-300/10 border bg-base">

    <!-- card-header -->
    <div class="py-3 px-3.5 border-b myBorder bg-sec font-bold flex items-center gap-3 text-primary lg:text-lg"
        style="font-family:sans-serif;">
        {{ListName}}
        <p class="rounded-full px-2 btn btn-sec leading-4 h-4.5 text-xs">{{Total}}
        </p>
    </div>
   @if(false){
<!-- action panel -->
<div class="p-3 flex justify-between bg-sec border-b myBorder">

    <!-- search form -->
    <div class=" flex text-sec w-1/3 lg:w-1/4">

        <div
            class="inline-flex btn-primary text-xs p-1.5 h-full border rounded-l-md items-center justify-center text-white/30">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-3.5 peer-focus:stroke-blue-700 transition-colors">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
        </div>

        <form [formGroup]="searchFormGroup" (ngSubmit)="handleSearch()"
            class="pl-1.5 border myBorder rounded-r-md overflow-hidden focus-within:border-white/40">

            <input class="form-control text-xs w-full h-full py-1.5 px-1.5 lg:text-sm order-2 focus:outline-none peer"
                type="search" placeholder="Search" aria-label="Search" formControlName="keyword">




        </form>
    </div>


    <div class="flex items-center gap-2" type="button" (click)="onExport()">
        <button class="btn btn-outline ">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" class="size-3.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 8.25H7.5a2.25 2.25 0 0 0-2.25 2.25v9a2.25 2.25 0 0 0 2.25 2.25h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25H15m0-3-3-3m0 0-3 3m3-3V15" />
            </svg>
            Export</button>

        <button class="btn btn-primary" type="button" (click)="onAdd()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.3"
                stroke="currentColor" class="size-3.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            New {{Name}}</button>

    </div>
</div>
   }

    <div class="min-w-full">
        <div class="min-w-full overflow-x-auto">
                    <ng-content></ng-content>
    <!-- Pagination -->
    @if (showPagination) {
    <div class="flex items-center justify-between border-t myBorder bg-sec px-4 py-3 ">

        <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
            <div>
                <p class="text-sm text-sec">
                    Showing <span class="font-medium text-primary">{{ fromIndex() }}</span> to <span
                    class="font-medium text-primary">{{ toIndex() }}</span> of
                    <span class="font-medium text-primary">{{ Total }}</span> results
                </p>
            </div>
            <div>
                <nav class="isolate inline-flex -space-x-px rounded-sm shadow-sm myBorder" aria-label="Pagination">
                    <button type="button"
                        class="relative inline-flex items-center rounded-l-md px-2 py-2 text-sec border myBorder hover:bg-primary/10 focus:z-20 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        [disabled]="currentPageIndex === 0"
                        (click)="goToPage(currentPageIndex - 1)">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                        class="size-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
                    </svg>

                    </button>
                    @for (p of pageNumbers(); track p) {
                    <button type="button"
                        class="relative inline-flex items-center px-4 py-2 text-sm font-semibold border myBorder hover:bg-primary/10 focus:z-20 transition-colors"
                        [class.btn-primary]="p === currentPageIndex"
                        [class.text-primary]="p !== currentPageIndex"
                        (click)="goToPage(p)">
                        {{ p + 1 }}
                    </button>
                    }
                    <button type="button"
                        class="relative inline-flex items-center rounded-r-md px-2 py-2 text-sec border myBorder hover:bg-primary/10 focus:z-20 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        [disabled]="currentPageIndex >= totalPages() - 1"
                        (click)="goToPage(currentPageIndex + 1)">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
    class="size-4">
    <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
</svg>
                    </button>
                </nav>
            </div>
        </div>
    </div>
    }
    </div>

    </div>
    </div>
